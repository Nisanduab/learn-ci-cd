# ============================================================
# 🚀 CI PIPELINE — Module 2: Advanced GitHub Actions
# ============================================================
#
# WHAT'S NEW IN MODULE 2:
#   ✅ Matrix Builds — test across multiple Node.js versions
#   ✅ Code Coverage — track how much code is tested
#   ✅ Concurrency — cancel outdated runs to save CI minutes
#   ✅ Job Outputs — pass data between jobs
#   ✅ Conditional Steps — run steps only in certain conditions
#   ✅ Status Badge — show CI status in README
#
# ============================================================

name: CI Pipeline

# ─── TRIGGERS ─────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    # NEW! Manual trigger WITH inputs
    # Go to Actions tab → CI Pipeline → "Run workflow" button
    # You can pass custom inputs!
    inputs:
      skip_lint:
        description: 'Skip the lint step (for debugging)'
        required: false
        type: boolean
        default: false

# ─── CONCURRENCY ──────────────────────────────────────
# NEW! If you push twice quickly, cancel the first run.
# Why? No point running CI on outdated code — saves CI minutes!
# Real companies save thousands of dollars/month with this.
concurrency:
  group: ci-${{ github.ref }}
  # group = unique key per branch. Same branch = same group.
  # If a new run starts in the same group, the old one is cancelled.
  cancel-in-progress: true

# ─── ENVIRONMENT VARIABLES ────────────────────────────
# NEW! Global env vars available to ALL jobs and steps.
# Useful for shared configuration.
env:
  NODE_ENV: test

jobs:

  # ═══════════════════════════════════════════════════
  # JOB 1: LINT
  # ═══════════════════════════════════════════════════
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    # NEW! Conditional execution — skip if manual trigger says so
    if: ${{ !inputs.skip_lint }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

  # ═══════════════════════════════════════════════════
  # JOB 2: TEST — Now with MATRIX BUILDS!
  # ═══════════════════════════════════════════════════
  # MATRIX BUILDS = run the same job multiple times with
  # different configurations. Like a for-loop for CI!
  #
  # Why? Your code might work on Node 22 but break on Node 20.
  # Matrix builds catch these compatibility issues.
  #
  # Real-world use cases:
  #   - Test across Node.js 18, 20, 22
  #   - Test on Ubuntu, Windows, macOS
  #   - Test with different database versions
  test:
    name: 🧪 Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    # ─── THE MATRIX ──────────────────────────────────
    strategy:
      matrix:
        node-version: [20, 22]
        # This creates 2 parallel jobs:
        #   🧪 Test (Node 20)
        #   🧪 Test (Node 22)
        #
        # Want to add OS testing too? Uncomment this:
        # os: [ubuntu-latest, windows-latest]
        # This would create 4 jobs: 2 node versions × 2 OS = 4 combinations!

      fail-fast: false
      # fail-fast: true  (default) → if Node 20 fails, cancel Node 22 immediately
      # fail-fast: false → run ALL matrix combinations even if one fails
      # We use false to see the FULL picture of what's broken

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # ${{ matrix.node-version }} = current value from the matrix
          # Job 1 gets '20', Job 2 gets '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      # ─── CODE COVERAGE ──────────────────────────────
      # NEW! Run tests WITH coverage reporting.
      # Coverage = "what percentage of your code is tested?"
      # Industry standard: aim for >80% coverage.
      - name: 🧪 Run tests with coverage
        run: npm run test:coverage

      # NEW! Upload coverage report as an artifact
      # You can download this from the Actions tab to see
      # exactly which lines are covered/uncovered.
      - name: 📤 Upload coverage report
        if: matrix.node-version == 22
        # Only upload once (from Node 22), not from every matrix job
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ═══════════════════════════════════════════════════
  # JOB 3: BUILD
  # ═══════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test

    # ─── JOB OUTPUTS ──────────────────────────────────
    # NEW! Jobs can output data that other jobs can read.
    # Here we output the build version for use in deployment.
    outputs:
      build-version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build TypeScript
        run: npm run build

      # NEW! Extract version from package.json and set as output
      - name: 📋 Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        # $GITHUB_OUTPUT is a special file that GitHub Actions reads
        # Whatever you write here becomes available to other jobs

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.version.outputs.version }}
          # Artifact name includes version for traceability!
          path: dist/
          retention-days: 7

  # ═══════════════════════════════════════════════════
  # JOB 4: SUMMARY (NEW!)
  # ═══════════════════════════════════════════════════
  # This job demonstrates:
  #   - Reading outputs from previous jobs
  #   - Conditional steps (only on main branch)
  #   - Creating a GitHub Actions Summary (markdown in Actions UI)
  summary:
    name: 📊 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    # needs: [array] = wait for ALL listed jobs to complete
    if: always()
    # "if: always()" = run this job even if previous jobs failed
    # Useful for summary/notification jobs that should ALWAYS run

    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Version**: ${{ needs.build.outputs.build-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        # $GITHUB_STEP_SUMMARY = special file that renders as markdown
        # in the GitHub Actions UI. Super useful for dashboards!

      # NEW! Fail the pipeline if any critical job failed
      - name: ❌ Check for failures
        if: needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "❌ Pipeline failed! Check the summary above."
          exit 1
